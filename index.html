<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 span.icon {
      font-size: 1.8rem;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      color: #2d3748;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row input::placeholder {
      color: #a0aec0;
    }

    .input-row button {
      padding: 12px 20px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #5a67d8;
    }

    .input-row button:active {
      transform: scale(0.97);
    }

    .input-row button:disabled {
      background: #a0aec0;
      cursor: not-allowed;
      transform: none;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 14px;
    }

    .stats .done-count {
      color: #48bb78;
      font-weight: 600;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid #edf2f7;
      animation: slideIn 0.2s ease;
    }

    li:last-child {
      border-bottom: none;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    li .checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid #cbd5e0;
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
    }

    li.checked .checkbox {
      background: #48bb78;
      border-color: #48bb78;
    }

    li .checkbox::after {
      content: '';
      display: none;
      width: 6px;
      height: 10px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }

    li.checked .checkbox::after {
      display: block;
    }

    li .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-all;
      transition: color 0.2s;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    li .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e0;
      font-size: 1.1rem;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }

    li .delete-btn:hover {
      color: #fc8181;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 40px 0 20px;
      font-size: 0.95rem;
    }

    .empty .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .clear-btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 10px;
      background: none;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      color: #718096;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .clear-btn:hover {
      border-color: #fc8181;
      color: #e53e3e;
    }

    .loading {
      text-align: center;
      color: #a0aec0;
      padding: 40px 0 20px;
      font-size: 0.95rem;
    }

    .error-msg {
      background: #fff5f5;
      border: 1px solid #fed7d7;
      color: #c53030;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 14px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span class="icon">🛒</span> 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 추가..." maxlength="100" />
      <button id="addBtn" onclick="addItem()">추가</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="stats">
      <span id="totalCount">전체 0개</span>
      <span class="done-count" id="doneCount">완료 0개</span>
    </div>

    <ul id="list"></ul>

    <div class="loading" id="loadingMsg">불러오는 중...</div>

    <div class="empty" id="emptyMsg" style="display:none">
      <div class="empty-icon">🗒️</div>
      리스트가 비어 있어요. 아이템을 추가해 보세요!
    </div>

    <button class="clear-btn" id="clearBtn" onclick="clearDone()" style="display:none">
      완료된 항목 삭제
    </button>
  </div>

  <script>
    const SUPABASE_URL = 'https://yofmzogceczezqdccvzh.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvZm16b2djZWN6ZXpxZGNjdnpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxODgwNDgsImV4cCI6MjA5Nzc2NDA0OH0.ke6zKcYeU7mTbNV1ibTpo8IuY_CqSkqZb9-QiwtDX5Y';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let items = [];

    const listEl = document.getElementById('list');
    const inputEl = document.getElementById('itemInput');
    const emptyMsg = document.getElementById('emptyMsg');
    const loadingMsg = document.getElementById('loadingMsg');
    const clearBtn = document.getElementById('clearBtn');
    const totalCount = document.getElementById('totalCount');
    const doneCount = document.getElementById('doneCount');
    const addBtn = document.getElementById('addBtn');
    const errorMsg = document.getElementById('errorMsg');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
      setTimeout(() => { errorMsg.style.display = 'none'; }, 4000);
    }

    function render() {
      listEl.innerHTML = '';

      items.forEach(item => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        const checkbox = document.createElement('div');
        checkbox.className = 'checkbox';
        checkbox.onclick = () => toggleItem(item.id, item.checked);

        const text = document.createElement('span');
        text.className = 'item-text';
        text.textContent = item.text;

        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.innerHTML = '✕';
        delBtn.title = '삭제';
        delBtn.onclick = () => deleteItem(item.id);

        li.appendChild(checkbox);
        li.appendChild(text);
        li.appendChild(delBtn);
        listEl.appendChild(li);
      });

      const total = items.length;
      const done = items.filter(i => i.checked).length;

      totalCount.textContent = `전체 ${total}개`;
      doneCount.textContent = `완료 ${done}개`;
      loadingMsg.style.display = 'none';
      emptyMsg.style.display = total === 0 ? 'block' : 'none';
      clearBtn.style.display = done > 0 ? 'block' : 'none';
    }

    async function loadItems() {
      const { data, error } = await db
        .from('shopping_items')
        .select('*')
        .order('position', { ascending: true })
        .order('created_at', { ascending: true });

      if (error) {
        showError('데이터를 불러오지 못했습니다: ' + error.message);
        loadingMsg.style.display = 'none';
        return;
      }

      items = data;
      render();
    }

    async function addItem() {
      const text = inputEl.value.trim();
      if (!text) { inputEl.focus(); return; }

      addBtn.disabled = true;
      const position = items.length;

      const { data, error } = await db
        .from('shopping_items')
        .insert([{ text, checked: false, position }])
        .select()
        .single();

      addBtn.disabled = false;

      if (error) {
        showError('추가 실패: ' + error.message);
        return;
      }

      items.push(data);
      render();
      inputEl.value = '';
      inputEl.focus();
    }

    async function toggleItem(id, currentChecked) {
      const { error } = await db
        .from('shopping_items')
        .update({ checked: !currentChecked })
        .eq('id', id);

      if (error) {
        showError('업데이트 실패: ' + error.message);
        return;
      }

      const item = items.find(i => i.id === id);
      if (item) item.checked = !currentChecked;
      render();
    }

    async function deleteItem(id) {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) {
        showError('삭제 실패: ' + error.message);
        return;
      }

      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearDone() {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('checked', true);

      if (error) {
        showError('삭제 실패: ' + error.message);
        return;
      }

      items = items.filter(i => !i.checked);
      render();
    }

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    loadItems();
  </script>
</body>
</html>
